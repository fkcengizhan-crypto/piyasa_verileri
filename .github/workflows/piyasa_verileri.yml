name: Piyasa Verilerini Güncelle

on:
  schedule:
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Chrome ve ChromeDriver kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Scripti çalıştır
        run: python verilericek.py

      - name: Dosyaları depoya ekle ve commit et
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add piyasa_verileri.xlsx piyasa_verileri.json
          git commit -m "Veriler güncellendi (otomatik)" || echo "Değişiklik yok"
          git push

      - name: Çıktıları sakla (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: piyasa-verileri
          path: |
            piyasa_verileri.xlsx
            piyasa_verileri.json