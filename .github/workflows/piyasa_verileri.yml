name: Piyasa Verilerini GДӮВјncelle

on:
  schedule:
    - cron: '15 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: piyasa-guncelleme
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Depoyu klonla
        uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ubuntu-latest'te Chrome pre-installed ama ChromeDriver eГ…ЕёleГ…Еёmeyebilir.
      # browser-actions/setup-chrome eГ…ЕёleГ…Еёen Chrome + ChromeDriver ДӮВ§iftini kurar.
      - name: Chrome ve ChromeDriver kurulumu
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Chrome sДӮВјrДӮВјmДӮВјnДӮВј doГ„Еёrula
        run: |
          google-chrome --version
          chromedriver --version

      - name: BaГ„ЕёГ„ВұmlГ„ВұlГ„ВұklarГ„Вұ yДӮВјkle
        run: pip install -r requirements.txt

      - name: Scripti ДӮВ§alГ„ВұГ…ЕёtГ„Вұr
        env:
          # setup-chrome'un kurduГ„Еёu binary path'ini kullan
          CHROME_BINARY_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          # CHROME_DRIVER_PATH ayarlanmГ„Вұyor ГўвҖ вҖҷ Selenium Manager PATH'ten otomatik bulur
        run: python verilericek.py

      - name: DosyalarГ„Вұ depoya ekle ve commit et
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add piyasa_verileri.xlsx piyasa_verileri.json
          if git diff --staged --quiet; then
            echo "DeГ„ЕёiГ…Еёiklik yok, atlanГ„Вұyor."
            exit 0
          fi
          git commit -m "Veriler gДӮВјncellendi (otomatik)"
          git pull --rebase origin main
          git push

      - name: ДӮвҖЎГ„ВұktГ„ВұlarГ„Вұ sakla (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: piyasa-verileri
          path: |
            piyasa_verileri.xlsx
            piyasa_verileri.json
