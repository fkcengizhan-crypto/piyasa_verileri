name: Piyasa Verilerini Güncelle

on:
  workflow_dispatch:   # Sadece manuel tetikleme

permissions:
  contents: write

concurrency:
  group: piyasa-guncelleme
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Daha kısa sürede hata verip tekrar deneyebilirsin

    steps:
      - name: Depoyu klonla
        uses: actions/checkout@v4

      - name: Chrome ve chromedriver kur
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - uses: browser-actions/setup-chromedriver@v1

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Scripti çalıştır
        run: python verilericek.py
        # Ortam değişkenlerini manuel tanımlamaya gerek yok,
        # browser-actions zaten CHROME_BINARY_PATH ve CHROME_DRIVER_PATH'i ayarlar.

      - name: Dosyaları depoya ekle ve commit et
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add piyasa_verileri.xlsx piyasa_verileri.json
          git diff --staged --quiet && echo "Değişiklik yok, atlanıyor." && exit 0
          git commit -m "Veriler güncellendi (otomatik)"
          git pull --rebase origin main
          git push

      - name: Çıktıları sakla (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: piyasa-verileri
          path: |
            piyasa_verileri.xlsx
            piyasa_verileri.json
