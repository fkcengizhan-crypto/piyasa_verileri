name: Piyasa Verileri Çek

on:
  schedule:
    - cron: '*/30 9-18 * * 1-5'  # Hafta içi 09:00-18:30 arası her 30 dk
  workflow_dispatch:

jobs:
  veri-cek:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # İşlem 5 dakikadan uzun sürerse iptal et
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Python 3.11 kullan (distutils hatasını önler)

      - name: Bağımlılıkları yükle
        run: |
          pip install selenium pandas requests beautifulsoup4 openpyxl

      - name: Chrome kur
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: xvfb kur
        run: |
          sudo apt-get install -y xvfb

      - name: Verileri çek (xvfb ile)
        run: |
          xvfb-run -a python verilericek.py

      - name: Çıktıları yükle
        uses: actions/upload-artifact@v4
        with:
          name: piyasa-verileri
          path: |
            piyasa_verileri.xlsx
            piyasa_verileri.json
