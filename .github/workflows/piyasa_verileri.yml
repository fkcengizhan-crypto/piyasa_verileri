name: Piyasa Verileri Çekme

on:
  schedule:
    - cron: '0 12 * * *'  # Her gün 12:00 UTC'de çalışır
  workflow_dispatch:       # Manuel çalıştırma da mümkün

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Kodu çek
      uses: actions/checkout@v4

    - name: Python'u kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Chrome'u kur
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        google-chrome --version

    - name: Bağımlılıkları yükle
      run: |
        pip install --upgrade pip
        pip install undetected-chromedriver selenium pandas requests beautifulsoup4 openpyxl

    - name: xvfb kur ve çalıştır
      run: |
        sudo apt-get install -y xvfb
        xvfb-run -a python verilericek.py

    - name: Çıktıları yayınla (Excel ve JSON)
      uses: actions/upload-artifact@v4
      with:
        name: piyasa-verileri
        path: |
          piyasa_verileri.xlsx
          piyasa_verileri.json
