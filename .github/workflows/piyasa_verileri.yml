name: Piyasa Verilerini Güncelle

on:
  schedule:
    # Hafta içi her gün TSİ 18:00'de (UTC 15:00) çalışır
    - cron: '0 15 * * 1-5'
  workflow_dispatch:  # Manuel tetikleme

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bağımlılıkları yükle
        run: |
          pip install -r requirements.txt

      - name: Chrome ve ChromeDriver kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Scripti çalıştır
        run: python piyasa_verileri.py

      - name: Çıktıları sakla (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: piyasa-verileri
          path: |
            piyasa_verileri.xlsx
            piyasa_verileri.json