name: Piyasa Verilerini Çek

on:
  schedule:
    - cron: "15 6 * * 1-5"   # 09:15 TR (UTC+3)
    - cron: "45 15 * * 1-5"  # 18:45 TR (UTC+3)
  workflow_dispatch:

jobs:
  veri-cek:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CHROME_BINARY_PATH: /usr/bin/google-chrome-stable
      CHROME_DRIVER_PATH: /usr/local/bin/chromedriver

    steps:
      - name: Kodu al (checkout)
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt   # ← eksik olan satır buydu

      - name: Bağımlılıkları yükle
        run: pip install --upgrade pip -r selenium beautifulsoup4 pandas requests openpyxl lxml

      - name: Google Chrome kur
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Chrome major sürümünü belirle
        run: |
          echo "CHROME_MAJOR=$(google-chrome-stable --version | grep -oP '\d+' | head -1)" \
            >> $GITHUB_ENV

      - name: ChromeDriver kur
        run: |
          DRIVER_URL=$(curl -s \
            "https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json" \
            | python3 -c "
          import sys, json, os
          data = json.load(sys.stdin)
          major = os.environ['CHROME_MAJOR']
          versions = [v for v in data['versions'] if v['version'].split('.')[0] == major]
          latest = versions[-1]
          downloads = latest['downloads'].get('chromedriver', [])
          url = next((d['url'] for d in downloads if d['platform'] == 'linux64'), '')
          print(url)
          ")
          echo "Driver URL: $DRIVER_URL"
          wget -q "$DRIVER_URL" -O chromedriver-linux64.zip
          unzip -q chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Piyasa verilerini çek
        run: python verilericek.py

      - name: Çıktıları artifact olarak yükle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: piyasa-verileri-${{ github.run_number }}
          path: |
            piyasa_verileri.xlsx
            piyasa_verileri.json
          retention-days: 30

      # Verileri repoya commit etmek için '#' işaretlerini kaldırın.
      # Repo → Settings → Actions → Workflow permissions → "Read and write" olmalı.
