name: Fon ve Hisse Fiyatlarını Çek

on:
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Run price fetcher script
        run: python FonHisseFiyatlari.py

      - name: Upload Excel and JSON files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fon-hisse-fiyatlari
          path: |
            FonHisseFiyatlari.xlsx
            FonHisseFiyatlari.json
            
      - name: Değişiklikleri commit et ve push'la
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add FonHisseFiyatlari.xlsx FonHisseFiyatlari.json
          git diff --staged --quiet || git commit -m "Güncel Fon ve Hisse Fiyatları"
          git push
